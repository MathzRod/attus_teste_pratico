<div class="app-shell">
  <header class="topbar">
    <div class="topbar__brand">
      <button class="icon-button" type="button" aria-label="Abrir menu">
        <mat-icon>menu</mat-icon>
      </button>

      <h1>USUARIOS</h1>
    </div>

    <div class="topbar__search">
      <mat-icon>search</mat-icon>

      <input
        type="text"
        [formControl]="searchControl"
        placeholder="Pesquisar..."
        aria-label="Pesquisar usuario"
      />
    </div>
  </header>

  <main class="users-page">
    <section class="users-section">
      <h2>Usuarios cadastrados</h2>

      @if (loading()) {
        <p class="feedback">Carregando usuarios...</p>
      }

      @if (!loading() && error()) {
        <p class="error">{{ error() }}</p>
      }

      @if (!loading() && !error()) {
        <div class="users-list">
          @for (user of users(); track user.id) {
            <article class="user-row">
              <div class="user-row__icon">
                <mat-icon>person</mat-icon>
              </div>

              <strong class="user-row__name">
                {{ user.name }}
              </strong>

              <span class="user-row__email">
                {{ user.email }}
              </span>

              <button
                class="icon-button user-row__edit"
                type="button"
                aria-label="Editar usuario"
                (click)="openEditDialog(user)"
              >
                <mat-icon>edit</mat-icon>
              </button>
            </article>
          } @empty {
            <p class="feedback">Nenhum usuario encontrado.</p>
          }
        </div>
      }
    </section>
  </main>

  <button
    class="fab"
    type="button"
    aria-label="Adicionar usuario"
    (click)="openCreateDialog()"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
